<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepVault</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>
<header class="app-header">
  <a href="#" class="logo" onclick="router.navigate('/')">
  <svg class="logo-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
    <rect x="3" y="8" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
    <path d="M6 8V5.5C6 3.5 7.5 2 10 2C12.5 2 14 3.5 14 5.5V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="10" cy="13" r="1.2" fill="currentColor"/>
  </svg>
  <span class="logo-text">Deep<span class="logo-accent">Vault</span></span>
</a>
  <div class="search-wrap">
    <input type="text" id="search-input" class="search-input" placeholder="Search notes..." autocomplete="off"
      oninput="renderSearchResults(searchNotes(this.value))"
      onfocus="if(this.value.length>=2)renderSearchResults(searchNotes(this.value))">
    <div id="search-results" class="search-results"></div>
  </div>
  <nav class="header-nav">
    <a href="javascript:void(0)" class="header-link" onclick="router.navigate('#/reference/DeepVault%20Guide')">&#x1F9ED; Guide</a>
    <a href="javascript:void(0)" class="header-link" onclick="router.navigate('#/reference/Glossary')">&#x1F4D5; Glossary</a>
    <button class="theme-btn" onclick="Theme.cycle();this.innerHTML=Theme.icon()" title="Switch theme">&#x1F319;</button>
    <select id="theme-select" class="theme-select" onchange="Theme.set(this.value)">
      <option value="dark">&#x1F319; Dark</option>
      <option value="light">&#x2600;&#xFE0F; Light</option>
      <option value="amoled">&#x1F31A; AMOLED</option>
    </select>
  </nav>
</header>

<main id="app-main">
  <div class="loading">Loading&#x2026;</div>
</main>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/search.js"></script>
<script src="js/router.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/topic-hub.js"></script>
<script src="js/quiz-engine.js"></script>
<script src="js/summary.js"></script>
<script src="js/learn.js"></script>
<script src="js/history.js"></script>
<script src="js/app.js"></script>
<script>Theme.init();</script>
</body>
</html>
