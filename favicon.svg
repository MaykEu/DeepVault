<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Vault body -->
  <rect x="2" y="6" width="28" height="24" rx="3" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
  <!-- Vault door seam -->
  <line x1="16" y1="6" x2="16" y2="30" stroke="#30363d" stroke-width="1.5"/>
  <!-- Left door panel -->
  <rect x="4" y="8" width="10" height="15" rx="1" fill="#161b22"/>
  <!-- Right door panel -->
  <rect x="18" y="8" width="10" height="15" rx="1" fill="#161b22"/>
  <!-- Lock dial -->
  <circle cx="16" cy="20" r="4" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <circle cx="16" cy="20" r="1.5" fill="#58a6ff"/>
  <!-- Dial markings -->
  <line x1="16" y1="16.5" x2="16" y2="17.5" stroke="#58a6ff" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Hinges -->
  <rect x="4" y="10" width="2" height="3" rx="0.5" fill="#30363d"/>
  <rect x="4" y="22" width="2" height="3" rx="0.5" fill="#30363d"/>
</svg>
